# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
#
# Package ecosystems include:
#
#   - docker
#   - docker-compose
#   - github-actions
#   - gitsubmodules
#   - npm (npm, pnpm, yarn)
#   - pip (pip, pip-compile, pipenv, poetry)
#   - pre-commit
#   - terraform
# A fill list is here:
# https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference#package-ecosystem-
---
version: 2
updates:
  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7  # Wait 7 days before creating PRs
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
